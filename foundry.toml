[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/src/v0.8/",
    "@chainlink/contracts-ccip/=lib/chainlink-brownie-contracts/contracts/src/v0.8/ccip/",
    "forge-std/=lib/forge-std/src/"
]
# See more config options https://github.com/foundry-rs/foundry/tree/master/configuration#foundrytoml

optimizer = true
optimizer_runs = 200

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.default.invariant]
runs = 128
depth = 50
fail_on_revert = false
[rpc_endpoints]
polkadot_hub = "${POLKADOT_HUB_RPC}"
sepolia = "${SEPOLIA_RPC_URL}"
[etherscan]
polkadot-testnet = { key = "verifyContract", url = "https://api.routescan.io/v2/network/testnet/evm/420420417/etherscan" }